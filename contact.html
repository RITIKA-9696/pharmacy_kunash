<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Us | Pharmacy Kunash</title>
  <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap");
  </style>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://kit.fontawesome.com/a2d9a64efb.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="./Footer/footer.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#36C2CE',
            secondary: '#0ea5e9',
            accent: '#10b981',
            dark: '#1e293b',
          },
          screens: {
            'xs': '375px',
          }
        }
      }
    }
  </script>
  <style>
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in-up { animation: fadeInUp 1s ease-out forwards; }
    
    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    .slide-in-left { animation: slideInLeft 0.5s ease-out forwards; }
    
    .floating-back-arrow {
      position: absolute;
      top: 120px;
      left: 15px;
      z-index: 10;
      width: 44px;
      height: 44px;
      background: #437c8a;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(8, 145, 178, 0.4);
      transition: all 0.3s ease;
    }
    
    @media (min-width: 768px) {
      .floating-back-arrow {
        top: 100px;
        left: 30px;
        width: 50px;
        height: 50px;
      }
    }
    
    .floating-back-arrow:hover {
      background: #9edbec;
      transform: scale(1.1);
      box-shadow: 0 6px 16px rgba(8, 145, 178, 0.6);
    }
    
    .floating-back-arrow svg {
      width: 20px;
      height: 20px;
      color: white;
    }
    
    @media (min-width: 768px) {
      .floating-back-arrow svg {
        width: 24px;
        height: 24px;
      }
    }
    
    /* Success/Error message styles */
    .notification {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 15px 25px;
      border-radius: 8px;
      color: white;
      font-weight: 500;
      z-index: 9999;
      animation: slideInLeft 0.5s ease-out;
      max-width: 90vw;
      width: 350px;
      box-sizing: border-box;
    }
    
    @media (max-width: 640px) {
      .notification {
        top: 10px;
        right: 10px;
        left: 10px;
        width: auto;
        max-width: calc(100vw - 20px);
        padding: 12px 20px;
        font-size: 14px;
      }
    }
    
    .success { background-color: #10b981; }
    .error { background-color: #ef4444; }
    
    /* Custom responsive utilities */
    .contact-container {
      max-width: 1200px;
      margin-left: auto;
      margin-right: auto;
      width: 100%;
    }
    
    /* Improve touch targets on mobile */
    @media (max-width: 640px) {
      input, textarea, button {
        font-size: 16px !important; /* Prevents zoom on iOS */
      }
      
      button, .floating-back-arrow {
        min-height: 44px; /* Minimum touch target size */
      }
    }
  </style>
</head>
<body class="top-0 mt-6 bg-gradient-to-b from-cyan-50 via-white to-cyan-100 min-h-screen flex flex-col">
  <div id="header-placeholder"></div>

  <!-- Floating Back Arrow -->
  <div class="floating-back-arrow" onclick="window.history.back()" aria-label="Go back">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
      <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
    </svg>
  </div>

  <!-- Main Section -->
  <main class="flex-grow contact-container py-8 px-4 sm:px-6 lg:py-10 lg:px-8">
    <div class="flex flex-col lg:flex-row items-center justify-center gap-6 lg:gap-10">
      <!-- Left Side - Image with Text Overlay -->
      <div class="w-full lg:w-1/2 relative fade-in-up">
        <div class="relative w-full h-[300px] sm:h-[400px] md:h-[450px] lg:h-[500px] xl:h-[590px]">
          <img
            src="https://i.pinimg.com/736x/69/f7/1d/69f71d88609cb0881627de9f98296c5f.jpg"
            alt="Contact Us Illustration"
            class="w-full h-full rounded-2xl shadow-lg object-cover transition-transform transform hover:scale-105 duration-500" />
         
          <!-- Overlay Text -->
          <div class="absolute inset-0 bg-black bg-opacity-40 rounded-2xl flex flex-col items-center justify-center text-center px-4 sm:px-6 md:px-8">
            <h2 class="text-xl xs:text-2xl sm:text-3xl md:text-4xl font-semibold text-white mb-3 md:mb-4">We'd Love to Hear from You!</h2>
            <p class="text-gray-100 text-sm xs:text-base sm:text-lg md:text-xl leading-relaxed max-w-xs sm:max-w-sm md:max-w-lg px-2">
              Whether you have a question, feedback, or just want to connect — feel free to reach out.<br class="hidden sm:block">
              Our team will get back to you as soon as possible.
            </p>
          </div>
        </div>
      </div>

      <!-- Right Side - Form -->
      <div class="w-full lg:w-1/2 bg-white mt-8 shadow-xl border border-gray-300 rounded-2xl p-4 sm:p-6 fade-in-up">
        <form id="contactForm" class="space-y-4 sm:space-y-5">
          <h3 class="text-xl sm:text-2xl font-bold text-cyan-700 mb-4 sm:mb-6 text-center">Get In Touch</h3>
         
          <!-- Name -->
          <div>
            <label for="name" class="block text-gray-700 font-semibold mb-1 sm:mb-2 text-sm sm:text-base">Full Name</label>
            <input type="text" id="name" name="user_name" placeholder="Enter your full name"
              class="w-full px-3 sm:px-4 py-2 sm:py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-cyan-500 focus:outline-none transition text-sm sm:text-base"
              required />
          </div>
         
          <!-- Email -->
          <div>
            <label for="email" class="block text-gray-700 font-semibold mb-1 sm:mb-2 text-sm sm:text-base">Email Address</label>
            <input type="email" id="email" name="user_email" placeholder="example@email.com"
              class="w-full px-3 sm:px-4 py-2 sm:py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-cyan-500 focus:outline-none transition text-sm sm:text-base"
              required />
          </div>
         
          <!-- Phone -->
          <div>
            <label for="phone" class="block text-gray-700 font-semibold mb-1 sm:mb-2 text-sm sm:text-base">Phone Number</label>
            <input type="tel" id="phone" name="phone" placeholder="+91 9876543210"
              class="w-full px-3 sm:px-4 py-2 sm:py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-cyan-500 focus:outline-none transition text-sm sm:text-base"
              required />
          </div>
         
          <!-- Message -->
          <div>
            <label for="message" class="block text-gray-700 font-semibold mb-1 sm:mb-2 text-sm sm:text-base">Your Message</label>
            <textarea id="message" name="message" rows="3" placeholder="Type your message here..."
              class="w-full px-3 sm:px-4 py-2 sm:py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-cyan-500 focus:outline-none transition text-sm sm:text-base resize-vertical"
              required></textarea>
          </div>
         
          <!-- Submit Button -->
          <div class="text-center pt-2">
            <button type="submit" id="submitBtn"
              class="w-full bg-cyan-600 hover:bg-cyan-700 text-white font-semibold py-3 sm:py-3.5 rounded-lg shadow-md transition-transform transform hover:scale-[1.02] duration-300 text-sm sm:text-base">
              <i class="fa-solid fa-paper-plane mr-2"></i> Send Message
            </button>
          </div>
          
          <!-- Additional Info (Optional) -->
          <div class="text-center text-gray-600 text-xs sm:text-sm pt-2">
            <p>We typically respond within 24-48 hours.</p>
          </div>
        </form>
      </div>
    </div>
  </main>

  <!-- Footer Section -->
  <div id="footer-placeholder"></div>

  <script>
    function loadHeader() {
      fetch('/Header/header.html')
        .then(r => { 
          if (!r.ok) {
            // If header can't be loaded, create a simple header
            createFallbackHeader();
            throw r; 
          }
          return r.text(); 
        })
        .then(html => {
          document.getElementById('header-placeholder').innerHTML = html;
          const script = document.createElement('script');
          script.src = '/Header/header.js?v=1.1.3'; 
          script.onload = () => console.log('Header JS loaded');
          script.onerror = () => console.log('Header JS failed to load');
          document.body.appendChild(script);
        })
        .catch(err => {
          console.error('Header load failed:', err);
        });
    }
    
    function createFallbackHeader() {
      const headerPlaceholder = document.getElementById('header-placeholder');
      headerPlaceholder.innerHTML = `
        <header class="bg-white shadow-md py-4 px-6">
          <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-cyan-700">GoodNeews</h1>
            <nav>
              <a href="/" class="text-gray-700 hover:text-cyan-600 px-3 py-2">Home</a>
              <a href="/contact" class="text-cyan-600 font-medium px-3 py-2">Contact</a>
            </nav>
          </div>
        </header>
      `;
    }

    function loadFooter() {
      fetch('/Footer/footer.html')
        .then(r => { 
          if (!r.ok) {
            // If footer can't be loaded, create a simple footer
            createFallbackFooter();
            throw r; 
          }
          return r.text(); 
        })
        .then(html => {
          document.getElementById('footer-placeholder').innerHTML = html;
        })
        .catch(err => {
          console.error('Footer load failed:', err);
        });
    }
    
    function createFallbackFooter() {
      const footerPlaceholder = document.getElementById('footer-placeholder');
      footerPlaceholder.innerHTML = `
        <footer class="bg-gray-800 text-white py-8 px-6 mt-12">
          <div class="container mx-auto text-center">
            <p class="text-gray-300">&copy; ${new Date().getFullYear()} GoodNeews. All rights reserved.</p>
            <p class="text-gray-400 text-sm mt-2">Contact us: support@goodneews.com</p>
          </div>
        </footer>
      `;
    }

    document.addEventListener('DOMContentLoaded', () => {
      loadHeader();
      loadFooter();
      
      // Adjust back arrow position on scroll for mobile
      let lastScrollTop = 0;
      const backArrow = document.querySelector('.floating-back-arrow');
      
      window.addEventListener('scroll', function() {
        if (window.innerWidth < 768) {
          const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
          
          if (scrollTop > lastScrollTop && scrollTop > 100) {
            // Scrolling down
            backArrow.style.opacity = '0.6';
            backArrow.style.transform = 'translateY(-10px)';
          } else {
            // Scrolling up
            backArrow.style.opacity = '1';
            backArrow.style.transform = 'translateY(0)';
          }
          lastScrollTop = scrollTop;
        }
      });
    });
  </script>
